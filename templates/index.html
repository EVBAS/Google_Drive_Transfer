<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Google Drive 极速下载器 Web UI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; padding-top: 50px; }
        .card { box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: none; }
        #progress-container { display: none; margin-top: 20px; }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="text-center mb-4" style="color: #4285F4;">Google Drive 下载器</h2>
                
                <form id="downloadForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Google Drive Folder ID</label>
                        <input type="text" class="form-control" id="targetId" placeholder="例如：1nkmvFpj7E0If8QNoCDT5ZmcUGkcX..." required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">本地保存文件夹名称或路径</label>
                        <input type="text" class="form-control" id="localRoot" value="./My_Drive_Downloads">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fs-5" id="startBtn">🚀 开始下载</button>
                </form>

                <div id="progress-container">
                    <h5 id="status-text" class="text-secondary mt-4">状态：等待中...</h5>
                    <div class="progress" style="height: 25px;">
                        <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated bg-success" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
                    </div>
                    <p class="mt-2 text-end text-muted" id="count-text">0 / 0 文件</p>
                    
                    <div id="fail-list-container" class="mt-3 text-danger" style="display:none;">
                        <strong>❌ 下载失败的文件:</strong>
                        <ul id="fail-list"></ul>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<script>
    let pollInterval;

    document.getElementById('downloadForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const targetId = document.getElementById('targetId').value.trim();
        const localRoot = document.getElementById('localRoot').value.trim();
        const startBtn = document.getElementById('startBtn');
        const progressContainer = document.getElementById('progress-container');
        
        // 禁用按钮并显示进度区域
        startBtn.disabled = true;
        startBtn.innerText = "运行中...";
        progressContainer.style.display = 'block';
        
        // 向 Flask 发起开始下载的请求 (相当于 requests.post)
        try {
            const response = await fetch('/api/start', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_id: targetId, local_root: localRoot })
            });
            const data = await response.json();
            
            if (response.ok) {
                // 开始每秒轮询状态
                pollInterval = setInterval(checkStatus, 1000);
            } else {
                alert("错误: " + data.error);
                startBtn.disabled = false;
                startBtn.innerText = "🚀 开始下载";
            }
        } catch (err) {
            alert("请求失败: " + err);
        }
    });

    async function checkStatus() {
        // 向 Flask 发起查询请求 (相当于 requests.get)
        const response = await fetch('/api/status');
        const state = await response.json();
        
        // 更新 UI
        document.getElementById('status-text').innerText = "状态：" + state.status_msg;
        document.getElementById('progress-bar').style.width = state.progress_percent + '%';
        document.getElementById('progress-bar').innerText = state.progress_percent + '%';
        
        if (state.total_files > 0) {
            document.getElementById('count-text').innerText = `${state.completed_files} / ${state.total_files} 文件`;
        }

        // 如果后端标志任务结束
        if (!state.is_running && state.status_msg !== "正在启动任务...") {
            clearInterval(pollInterval);
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').innerText = "✅ 重新开始";
            document.getElementById('progress-bar').classList.remove('progress-bar-animated');
            
            if (state.failed_files.length > 0) {
                document.getElementById('fail-list-container').style.display = 'block';
                const ul = document.getElementById('fail-list');
                ul.innerHTML = "";
                state.failed_files.forEach(f => {
                    let li = document.createElement('li');
                    li.innerText = f;
                    ul.appendChild(li);
                });
            }
        }
    }
</script>
</body>
</html>
